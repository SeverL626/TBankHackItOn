<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя статистика</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 20px;
            padding: 32px 24px;
            width: 100%;
            max-width: 340px;
            text-align: center;
        }
        .label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            opacity: 0.5;
            margin-bottom: 8px;
        }
        .value {
            font-size: 56px;
            font-weight: 700;
            line-height: 1;
            color: var(--tg-theme-button-color, #2481cc);
        }
        .word {
            font-size: 30px;
            font-weight: 600;
        }
        .divider {
            height: 1px;
            background: var(--tg-theme-hint-color, #ccc);
            opacity: 0.3;
            margin: 24px 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="label">Сообщений отправлено</div>
        <div class="value" id="count">…</div>
        <div class="divider"></div>
        <div class="label">Самое популярное слово</div>
        <div class="word" id="topWord">…</div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const userId = tg.initDataUnsafe?.user?.id;

        if (!userId) {
            document.getElementById('count').textContent = '?';
            document.getElementById('topWord').textContent = 'нет данных';
        } else {
            fetch('/api/stats?userId=' + userId)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('count').textContent = data.messageCount;
                    document.getElementById('topWord').textContent = data.topWord ?? '—';
                })
                .catch(() => {
                    document.getElementById('count').textContent = '!';
                    document.getElementById('topWord').textContent = 'ошибка';
                });
        }
    </script>
</body>
</html>
