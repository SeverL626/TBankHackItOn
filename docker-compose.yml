services:
  db:
    image: postgres:16
    container_name: tbank-hackiton-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meventus}
      POSTGRES_USER: ${POSTGRES_USER:-meventus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meventus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PUBLIC_BIND:-0.0.0.0}:${POSTGRES_PUBLIC_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meventus} -d ${POSTGRES_DB:-meventus}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    container_name: tbank-hackiton-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-meventus}
      DATABASE_USER: ${POSTGRES_USER:-meventus}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-meventus}
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2
    container_name: tbank-hackiton-caddy
    restart: unless-stopped
    ports:
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
