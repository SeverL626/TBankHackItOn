name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -p "${VPS_SSH_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts

          ssh -p "${VPS_SSH_PORT:-22}" -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" << 'EOF'
            set -e

            cd /opt/myapp

            GIT_SSH_COMMAND="ssh -i ~/.ssh/tbankhack_repo_deploy -o IdentitiesOnly=yes" git fetch origin main
            git reset --hard origin/main

            if [ -f docker-compose.prod.yml ]; then
              docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
            elif [ -f docker-compose.yml ]; then
              docker compose up -d --build --remove-orphans
            else
              echo "No docker compose file found"
              exit 1
            fi

            docker image prune -f
          EOF