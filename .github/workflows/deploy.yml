name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build app on GitHub runner
        run: |
          chmod +x ./gradlew
          ./gradlew installDist --no-daemon
          tar -C build/install -czf meventus.tar.gz meventus

      - name: Upload and deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -p "${VPS_SSH_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts

          ssh -p "${VPS_SSH_PORT:-22}" -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" "mkdir -p /opt/myapp"

          scp -P "${VPS_SSH_PORT:-22}" -i ~/.ssh/deploy_key \
            meventus.tar.gz docker-compose.yml Dockerfile.runtime Caddyfile .env.example \
            "$VPS_USER@$VPS_HOST:/opt/myapp/"

          ssh -p "${VPS_SSH_PORT:-22}" -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" << 'EOF'
            set -e

            cd /opt/myapp

            rm -rf runtime
            mkdir -p runtime
            tar -xzf meventus.tar.gz -C runtime

            if [ ! -f .env ]; then
              cp .env.example .env
              echo ".env created. Fill BOT_TOKEN, BOT_USERNAME and POSTGRES_PASSWORD on VPS."
            fi

            docker compose up -d --build --remove-orphans
            docker image prune -f
          EOF
